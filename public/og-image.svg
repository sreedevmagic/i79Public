<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1117"/>
  <!-- Background glows -->
  <ellipse cx="250" cy="315" rx="480" ry="340" fill="#0A7566" opacity="0.06"/>
  <ellipse cx="1050" cy="180" rx="350" ry="280" fill="#0E8CB5" opacity="0.05"/>

  <!-- Logo box -->
  <rect x="80" y="68" width="52" height="52" rx="10" fill="#0A7566"/>
  <text x="106" y="104" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">i79</text>
  <!-- Logo wordmark -->
  <text x="148" y="103" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="600" fill="#B2D8D4">Engage</text>

  <!-- Badge pill -->
  <rect x="80" y="155" width="218" height="32" rx="16" fill="#0A7566" opacity="0.2"/>
  <rect x="80" y="155" width="218" height="32" rx="16" fill="none" stroke="#0A7566" stroke-width="1" opacity="0.4"/>
  <circle cx="102" cy="171" r="5" fill="#15B8A0"/>
  <text x="116" y="176" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#15B8A0">AI Hiring Platform</text>

  <!-- Main headline line 1 -->
  <text x="80" y="285" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="68" font-weight="700" fill="#F0FAFA">From First Candidate</text>
  <!-- Main headline line 2 — gradient approximated with teal -->
  <text x="80" y="365" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="68" font-weight="700" fill="#15B8A0">to Final Decision.</text>

  <!-- Subtext -->
  <text x="80" y="430" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="24" fill="#7BADA9">Automated screening · AI interviews · Decision packs</text>

  <!-- Right side: pipeline steps visual -->
  <g transform="translate(820, 200)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="280" height="44" rx="10" fill="#0A2828" stroke="#1E3B38" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="44" rx="2" fill="#15B8A0"/>
    <text x="18" y="27" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#B2D8D4">01  Create Job</text>
    <!-- connector -->
    <line x1="140" y1="44" x2="140" y2="56" stroke="#1E3B38" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- Step 2 -->
    <rect x="0" y="56" width="280" height="44" rx="10" fill="#0A2828" stroke="#1E3B38" stroke-width="1"/>
    <rect x="0" y="56" width="4" height="44" rx="2" fill="#15B8A0"/>
    <text x="18" y="83" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#B2D8D4">02  Candidate Scoring</text>
    <!-- connector -->
    <line x1="140" y1="100" x2="140" y2="112" stroke="#1E3B38" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- Step 3 -->
    <rect x="0" y="112" width="280" height="44" rx="10" fill="#0A2828" stroke="#1E3B38" stroke-width="1"/>
    <rect x="0" y="112" width="4" height="44" rx="2" fill="#15B8A0"/>
    <text x="18" y="139" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#B2D8D4">03  AI Interview</text>
    <!-- connector -->
    <line x1="140" y1="156" x2="140" y2="168" stroke="#1E3B38" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- Step 4 -->
    <rect x="0" y="168" width="280" height="44" rx="10" fill="#0A2828" stroke="#15B8A0" stroke-width="1" opacity="0.6"/>
    <rect x="0" y="168" width="4" height="44" rx="2" fill="#15B8A0"/>
    <text x="18" y="195" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#15B8A0">04  Decision Pack</text>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="582" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="500" fill="#3D7A76">i79.ai/engage</text>
</svg>

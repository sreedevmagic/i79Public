<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1F1E"/>
  <!-- Subtle radial glow -->
  <ellipse cx="280" cy="315" rx="420" ry="320" fill="#0A7566" opacity="0.07"/>
  <ellipse cx="950" cy="200" rx="300" ry="250" fill="#0E8CB5" opacity="0.05"/>
  <!-- Logo box -->
  <rect x="80" y="68" width="56" height="56" rx="12" fill="#0A7566"/>
  <text x="108" y="108" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">i79</text>
  <!-- Logo wordmark -->
  <text x="150" y="108" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="21" font-weight="600" fill="#B2D8D4">Intelligence, Engineered.</text>
  <!-- Divider -->
  <line x1="80" y1="152" x2="320" y2="152" stroke="#1E3B38" stroke-width="1"/>
  <!-- Main headline -->
  <text x="80" y="295" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="700" fill="#F0FAFA">AI Transformation.</text>
  <text x="80" y="382" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="700" fill="#15B8A0">Built for Impact.</text>
  <!-- Subtext -->
  <text x="80" y="455" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="26" fill="#7BADA9">Enterprise AI consulting &amp; intelligent recruitment platforms.</text>
  <!-- URL badge -->
  <rect x="80" y="530" width="96" height="34" rx="8" fill="#0A7566" opacity="0.3"/>
  <text x="128" y="552" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" fill="#15B8A0" text-anchor="middle">i79.ai</text>
</svg>
